<!doctype html>
<html>
<body>
  <button id="button">Press me</button>
  <div id="result"></div>

  <script>
    console.log("Script test fixture loaded");
    console.log("[TEST-0013]: Event object target. Action: click the Press me button. Expected: #result text becomes button.");
    document.getElementById("button").addEventListener("click", function (event) {
      document.getElementById("result").textContent = event.target.id;
    });
  </script>
</body>
</html>
