<!doctype html>
<html>
<body>
  <button id="button">Count</button>
  <div id="result">0</div>

  <script>
    console.log("Script test fixture loaded");
    console.log("[TEST-0023]: Closures in event handlers. Action: click Count three times. Expected: #result text becomes 3.");
    let count = 0;

    document.getElementById("button").addEventListener("click", function () {
      count = count + 1;
      document.getElementById("result").textContent = String(count);
    });
  </script>
</body>
</html>
